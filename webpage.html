<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Permablot</title>
  <link rel="stylesheet" href="https://amazinaxel.com/css/reset.css">
  <link rel="stylesheet" href="https://amazinaxel.com/css/vars.css">
  <link rel="stylesheet" href="https://amazinaxel.com/css/typography.css">
  <link rel="stylesheet" href="https://amazinaxel.com/css/other.css">
  <style>
    body { background: var(--darkest1); font-family: var(--primaryFont); }
    #wrapper { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { text-align: center; }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: .25rem 1.5rem; }
  </style>
</head>
<body>
<div id="wrapper">
  <h1>Permablot</h1>

  <!-- upload -->
  <div class="innerCard">
    <h2>Upload</h2>
    <form id="up">
      <input type="file" name="pdf" accept="application/pdf" required>
      <div class="row">
        <label>Threshold <input type="number" name="threshold" value="128" min="0" max="255"></label>
        <label>Scale <input type="number" name="scale" value="1.0" step="0.1" min="0" max="1"></label>
      </div>
      <div class="row">
        <label>DPI <input type="number" name="dpi" value="300" min="50"></label>
        <label>Margin <input type="number" name="margin" value="2" step="0.5" min="0"></label>
      </div>
      <label class="container">
        <input type="checkbox" name="nocrop">
        <span class="checkmark"></span>
        No crop
      </label>
      <button id="upbtn" type="submit">Upload</button>
    </form>
    <div id="uplog"></div>
  </div>

  <!-- quality -->
  <div class="innerCard">
    <h2>Quality</h2>
    <div class="row">
      <label class="container">
        <input type="radio" name="q" value="draft">
        <span class="checkmark"></span>
        Draft
      </label>
      <label class="container">
        <input type="radio" name="q" value="poster">
        <span class="checkmark"></span>
        Poster
      </label>
    </div>
  </div>

  <!-- bottom machine control -->
  <div class="innerCard">
    <h2>Machine control</h2>
    <span id="status"></span>
    <div id="controls" class="row" style="margin-top: 0.6rem"></div>
  </div>
</div>

<script>
  const $ = (s) => document.querySelector(s);

  async function post(url, body) {
    const r = await fetch(url, body ? { method: "POST", body } : { method:"POST" });
    return r.json().catch(() => ({}));
  };

  function render(s) {
    $("#status").textContent =
      ((s.state === "idle") ? "Not running" : s.state[0].toUpperCase()) + s.state.slice(1);

    for (const el of document.getElementsByName("q")) {
      el.checked = el.value === s.quality;
      el.disabled = el.value === s.quality;
    };

    // update controls, only available when not running
    const c = $("#controls");
    if (s.state === "idle") {
      c.innerHTML =
        '<button id="bprint">Print</button>' +
        '<button id="bsleep">Sleep</button>' +
        '<button id="block">' + (s.motorsLocked ? "Unlock motors" : "Lock motors") + '</button>';
      $("#bprint").onclick = async () => await post("/print"); // PRINT
      $("#bsleep").onclick = async () => await post("/sleep"); // SLEEP
      $("#block").onclick = async () => await post(s.motorsLocked ? "/unlock" : "/lock"); // LOCK
    } else c.innerHTML = "";
  };

  for (const el of document.getElementsByName("q")) {
    el.addEventListener("change", async () =>
      await post("/quality", new URLSearchParams({ q: el.value }))
    );
  };

  $("#up").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("#upbtn").disabled = true;
    $("#uplog").textContent = "Converting to gcode...";
    const res = await post("/upload", new FormData($("#up")));
    $("#uplog").textContent = res.ok ? "Done!" : "Error: " + (res.error||"failed");
    $("#upbtn").disabled = false;
  });

  const es = new EventSource("/events");
  es.onmessage = (e) => render(JSON.parse(e.data));
</script>
</body>
</html>
